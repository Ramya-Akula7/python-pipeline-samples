apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramya-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ramya-devops
  template:
    metadata:
      labels:
        app: ramya-devops
    spec:
      containers:
        - name: ramya-devops
          image: $(+artifact.image)
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
